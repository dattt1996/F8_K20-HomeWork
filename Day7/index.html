<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Example</title>

    <style>
      table {
        border-collapse: collapse;
        width: 400px;
        text-align: center;
        margin: 20px auto auto auto;
      }

      th,
      td {
        border: 1px solid black;
        padding: 10px;
      }

      h2  {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <table>
      <h2>
        A test table with merged cells
      <h2>

      <thead>
        <tr>
          <th rowspan="2"></th>
          <th colspan="2">Average</th>
          <th rowspan="2">Red eyes</th>
        </tr>

        <tr>
          <th>height</th>
          <th>weight</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <th>Males</th>
          <td>1.9</td>
          <td>0.003</td>
          <td>40%</td>
        </tr>

        <tr>
          <th>Females</th>
          <td>1.7</td>
          <td>0.002</td>
          <td>43%</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="4">Statistics Table</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
