<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box-parent {
        margin-bottom: 100px;
      }

      .box-1,
      .box-2,
      .box-3,
      .box-4,
      .box-5,
      .box-6,
      .box-7 {
        display: inline-block;
        margin-left: 100px;
      }

      .box-parent .box-1 {
        width: 50px;
        height: 50px;
        border: 2px solid orangered;
      }

      .box-parent .box-2 {
        width: 90px;
        height: 40px;
        border: 2px solid blue;
      }

      .box-parent .box-3 {
        width: 0;
        height: 0;
        border-right: 30px solid transparent;
        border-left: 30px solid transparent;
        border-bottom: 60px solid green;
      }

      .box-parent .box-4 {
        width: 0;
        height: 0;
        border-top: 60px solid rgb(214, 161, 61);
        border-right: 30px solid transparent;
        border-left: 30px solid transparent;
      }

      .box-parent .box-5 {
        width: 0;
        height: 0;
        border-top: 30px solid transparent;
        border-bottom: 30px solid transparent;
        border-right: 60px solid rgb(150, 77, 150);
      }

      .box-parent .box-6 {
        width: 0;
        height: 0;
        border-top: 30px solid transparent;
        border-bottom: 30px solid transparent;
        border-left: 60px solid rgb(233, 161, 26);
      }

      .box-parent .box-7 {
        width: 50px;
        height: 50px;
        border-left: 40px solid transparent;
        border-right: 40px solid transparent;
        border-bottom: 60px solid rgb(149, 222, 149);
      }

      .box-8,
      .box-9,
      .box-10,
      .box-11,
      .box-12,
      .box-13 {
        display: inline-block;
        margin-left: 140px;
      }

      .box .box-8 {
        width: 0;
        height: 0;
        border-left: 50px solid transparent;
        border-right: 50px solid transparent;
        border-bottom: 30px solid gray;
      }

      .box .box-9 {
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 80px solid brown;
      }

      .box .box-10 {
        width: 0;
        height: 0;
        border-left: 30px solid transparent;
        border-right: 30px solid transparent;
        border-bottom: 50px solid rgb(186, 81, 81);
      }

      .box .box-11 {
        width: 0;
        height: 0;
        border-top: 30px solid transparent;
        border-bottom: 30px solid transparent;
        border-left: 50px solid rgb(149, 222, 149);
      }

      .box .box-12 {
        width: 0;
        height: 0;
        border-top: 30px solid transparent;
        border-bottom: 30px solid transparent;
        border-right: 50px solid rgb(150, 77, 150);
      }

      .box-13 {
        width: 50px;
        height: 5px;
        padding: 18px;
        background-color: rgb(186, 81, 81);
        position: relative;
      }

      .box-13::after {
        content: "";
        display: inline-block;
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        border-right: 20px solid white;
      }

      .logo-f8 {
        margin-top: 100px;
        margin-left: 600px;
      }

      .first-letter,
      .second-letter {
        display: inline-block;
        width: 100px;
        height: 146px;
        background: orange;
        border-right: 1px solid white;
        position: relative;
        margin-left: 15px;
      }

      .first-letter::before {
        content: "";
        display: inline-block;
        position: absolute;
        right: 0;
        top: 20px;
        width: 80px;
        height: 30px;
        background: white;
      }

      .first-letter::after {
        content: "";
        display: inline-block;
        position: absolute;
        width: 80px;
        height: 80px;
        right: 0;
        bottom: 0;
        background: white;
      }

      .second-letter::before {
        content: "";
        display: inline-block;
        position: absolute;
        left: 20px;
        top: 20px;
        width: 60px;
        height: 40px;
        background-color: white;
      }

      .second-letter::after {
        content: "";
        display: inline-block;
        position: absolute;
        left: 20px;
        bottom: 20px;
        width: 60px;
        height: 40px;
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="box-parent">
      <div class="box-1"></div>
      <div class="box-2"></div>
      <div class="box-3"></div>
      <div class="box-4"></div>
      <div class="box-5"></div>
      <div class="box-6"></div>
      <div class="box-7"></div>
    </div>

    <div class="box">
      <div class="box-8"></div>
      <div class="box-9"></div>
      <div class="box-10"></div>
      <div class="box-11"></div>
      <div class="box-12"></div>
      <div class="box-13"></div>
    </div>

    <div class="logo-f8">
      <div class="first-letter"></div>
      <div class="second-letter"></div>
    </div>
  </body>
</html>
